#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "nextcloud-signaling"
name = "Nextcloud Signaling"
description.en = "Standalone signaling server in order to meet more than 3 persons onto Nextcloud Talk"
description.fr = "Serveur de signalisation autonome pour rencontrer plus de 3 personnes sur Nextcloud Talk"

version = "2.1.1~ynh1"

maintainers = ["ljf"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://nextcloud.com/talk/"
demo = "https://nextcloud.com/talk/"
admindoc = "https://nextcloud-spreed-signaling.readthedocs.io/"
userdoc = "https://docs.nextcloud.com/server/latest/admin_manual/configuration_server/high_performance_backend_for_talk.html"
code = "https://github.com/strukturag/nextcloud-spreed-signaling"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = "not_relevant"
sso = "not_relevant"

disk = "50M"
ram.build = "200M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/standalone-signaling"

    [install.backends_urls]
    ask.en = "Backend url"
    type = "string"
    example = "https://cloud.example.com"
    help.en = "Configure the first Nextcloud instance to allow the use this signaling server. After the installation, you will be able to add others instances from the app configuration panel."
    help.fr = "Configurez la première instance Nextcloud pour autoriser l'utilisation de ce serveur de signalisation. Après l'installation, vous pourrez ajouter d'autres instances à partir du panneau de configuration de l'application."
    
    [install.turn_endpoints]
    ask.en = "TURN server endpoints"
    type = "string"
    example = "turn:domain.tld:3478?transport=udp,turn:domain.tld:3478?transport=tcp"
    help.en = "You need at least one Coturn or eturn servers. Coturn is packaged for YunoHost so you should probably install it first."
    help.fr = "Vous avez besoin d'au moins un serveur Coturn ou eturn. Coturn est fourni dans le package YunoHost, vous devriez donc probablement l'installer en premier."
    
    [install.turn_api_key]
    ask.en = "TURN API key"
    type = "string"

    [install.turn_secret]
    ask.en = "TURN secret"
    type = "string"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/strukturag/nextcloud-spreed-signaling/archive/refs/tags/v2.1.1.tar.gz"
    sha256 = "63cf62ae57ee372ace48c24fd758af26142669318ddbacc5f52eada544dceffd"
    autoupdate.strategy = "latest_github_release"
    
    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    main.allowed = "visitors"
    main.auth_header = false
    main.show_tile = false
    main.protected = true

    [resources.ports]
    main.default = 8080
    janus_http.default = 8088
    janus_ws.default = 8188
    nats.default = 4222

    [resources.apt]
    packages = "automake, build-essential, python3, protobuf-compiler, nats-server, janus"

    [resources.go]
    version = "1.25"
    