# Redirect to path with trailing slash only if not already present
rewrite ^__PATH__([^/])$ __PATH__/$1 permanent;

# Fallback for root path to avoid infinite redirect loop and return 200 OK
location = __PATH__/ {
  default_type text/plain;
  return 200 'Nextcloud Signaling server is running.';
}

# Main signaling server endpoint
location __PATH__/ {
  proxy_pass http://127.0.0.1:__PORT__/;
  include    proxy_params_no_auth;
}

location __PATH__/spreed/ {
  proxy_pass http://127.0.0.1:__PORT__/spreed/;
  include    proxy_params_no_auth;
}

# API endpoints
location __PATH__/api/ {
  proxy_pass http://127.0.0.1:__PORT__/api/;
  include    proxy_params_no_auth;
}

location /janus {
  auth_basic off;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Host $host;
  proxy_set_header X-NginX-Proxy true;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_max_temp_file_size 0;
  proxy_pass http://127.0.0.1:__PORT_JANUS_WS__;
  proxy_redirect off;
  proxy_read_timeout 240s;
}
